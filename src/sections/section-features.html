<section id="features" class="section" aria-labelledby="features-title">
  <div class="container">
    {{#if site.features.title}}
      <h2 id="features-title" class="section__title">
        {{upper site.features.title}}
      </h2>
    {{/if}}

    {{#if site.features.text}}
      <p class="section__text">
        {{ site.features.text }}
      </p>
    {{/if}}

    {{#if site.features.items.length}}
      <ul>
        {{#each site.features.items}}
          <li>
            {{ this }}
          </li>
        {{/each}}
      </ul>
    {{/if}}
  </div>
</section>
