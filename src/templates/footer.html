<footer id="footer" class="footer">
  <div class="container">
    <div class="footer__inner">
      {{picture
        "/images/logo.png"
        ""
        class="footer__logo"
      }}
      <p class="footer__description">
        BRUSH is a prediction and entertainment app. Strokes are a play currency with no cash value, used for entertainment purposes only — no purchase necessary, no real money involved.
      </p>
      <a
        class="footer__creator"
        href="https://improvs.com/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Built by
        <img src="/images/creator.svg" alt="Improvs" />
      </a>
    </div>
    <div class="footer__bottom">
      <p>© All rights reserved.</p>
      <ul class="footer__socials">
        <li>
          <a
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="BRUSH on Instagram"
          >
            <img src="/images/inst.svg" alt="" />
          </a>
        </li>
        <li>
          <a
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="BRUSH on TikTok"
          >
            <img src="/images/tiktok.svg" alt="" />
          </a>
        </li>
      </ul>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</footer>
