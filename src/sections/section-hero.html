<section id="hero" class="hero">
  <div class="container">
  <div class="hero__inner">
    <div class="hero__content">
      <div class="hero__text-wrapper">
        {{picture
          "/images/text.png"
          "Hero image"
          class="hero__text-1"
        }}
        {{picture
          "/images/hero-arrows.png"
          "Hero image"
          class="hero__arrows"
        }}
      </div>
      <button class="hero__btn desktop"><span>Join the waitlist</span></button>
    </div>
    <div class="hero__image-wrapper">
      {{picture
        "/images/hero-img.png"
        "Hero image"
        class="hero__image"
      }}
      <button class="hero__btn mobile"><span>Join the waitlist</span></button>
    </div>
  </div>
</section>
