<section class="watch" aria-labelledby="watch-title">
  <div class="container">
    <div class="watch__inner">
      <h2 id="watch-title" class="watch__title">
        Don't watch the knockout rounds from the sidelines — or the bench.
      </h2>
      <p class="watch__description">
        Join the waitlist.
        <b>Free to play, right now.</b>
        We'll let you know the second you're in.
      </p>
      <button class="btn-cta" type="button" data-waitlist-open>
        <span>Join the waitlist</span>
      </button>
    </div>
  </div>
  {{picture
    "/images/watch-img.png"
    "Football fans in a stadium"
    class="watch__image"
    mobile="/images/watch-img-mob.png"
  }}
</section>
